<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재생목록 좋아요 순위</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lisu&display=swap" rel="stylesheet">
<style>
  /* Noto Sans Lisu는 Lisu 문자(U+A4D0–A4FF)에만 적용하고,
     Ʞ 같은 라틴 확장 문자는 리수 문자와 모양이 비슷해 오인식되지 않도록
     일반 시스템 폰트로 강제 매핑 */
  @font-face{
    font-family:'Noto Sans Lisu';
    unicode-range:U+0250-02AF,U+1D00-1D7F,U+1D80-1DBF,U+A720-A7FF;
    src:local('Arial'),local('Helvetica Neue'),local('Helvetica'),local('sans-serif');
  }
  :root{
    --bg:#0a0a12;
    --bg-panel:#12121e;
    --line:#242438;
    --cyan:#00e5c7;
    --magenta:#ff2e88;
    --gold:#ffcb47;
    --text:#f1f0f7;
    --muted:#8a89a3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(255,46,136,0.12), transparent 45%),
      radial-gradient(circle at 85% 10%, rgba(0,229,199,0.10), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:'Noto Sans Lisu', sans-serif;
    min-height:100vh;
    padding:32px 20px 64px;
  }
  .wrap{max-width:880px;margin:0 auto;}

  header{margin-bottom:28px;}
  .eyebrow{
    font-family:'Noto Sans Lisu',sans-serif;
    font-weight:600;
    letter-spacing:.25em;
    font-size:12px;
    color:var(--cyan);
    text-transform:uppercase;
  }
  h1{
    font-family:'Noto Sans Lisu',sans-serif;
    font-size:clamp(28px,5vw,42px);
    margin:6px 0 8px;
    line-height:1.1;
    background:linear-gradient(90deg,var(--text),var(--cyan));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .sub{color:var(--muted);font-size:14px;max-width:560px;}

  .panel{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
    margin-bottom:24px;
  }
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .field{flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px;}
  label{font-size:12px;color:var(--muted);font-weight:500;}
  input{
    background:#0d0d18;
    border:1px solid var(--line);
    border-radius:8px;
    padding:11px 12px;
    color:var(--text);
    font-size:14px;
    font-family:'Noto Sans Lisu',sans-serif;
    outline:none;
  }
  input:focus{border-color:var(--cyan);}
  .keyhint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5;}
  .keyhint a{color:var(--cyan);}

  button{
    margin-top:14px;
    background:linear-gradient(90deg,var(--magenta),#ff5f9e);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:12px 22px;
    font-family:'Noto Sans Lisu',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:.04em;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  button:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(255,46,136,0.28);}
  button:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

  .btn-row{display:flex;align-items:center;gap:10px;}
  .btn-row button{margin-top:14px;}
  .secondary-btn{
    background:#0d0d18;
    border:1px solid var(--line);
    color:var(--text);
    padding:12px 18px;
    font-family:'Noto Sans Lisu',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:.04em;
  }
  .secondary-btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:none;transform:none;}

  #status{font-size:13px;color:var(--muted);margin-top:10px;min-height:18px;}
  #status.err{color:var(--magenta);}

  .table-scroll{
    width:100%;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:thin;
    scrollbar-color:var(--line) transparent;
  }
  .table-scroll::-webkit-scrollbar{height:8px;}
  .table-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
  table{width:100%;min-width:640px;border-collapse:collapse;}
  thead th{
    text-align:left;
    font-family:'Noto Sans Lisu',sans-serif;
    font-size:12px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--muted);
    padding:0 12px 10px;
    border-bottom:1px solid var(--line);
  }
  tbody tr{border-bottom:1px solid var(--line);}
  tbody tr:last-child{border-bottom:none;}
  tbody td{padding:12px;vertical-align:middle;}

  .rank{
    font-family:'Noto Sans Lisu',sans-serif;
    font-weight:700;
    font-size:18px;
    width:40px;
    color:var(--muted);
  }
  tr:nth-child(1) .rank{color:var(--gold);font-size:22px;}
  tr:nth-child(2) .rank{color:#cfd3e0;}
  tr:nth-child(3) .rank{color:#e0a06a;}

  .vid-id{
    font-family:'Noto Sans Lisu',sans-serif;
    font-weight:700;
    color:var(--muted);
    font-size:14px;
  }
  .artist{color:var(--text);font-weight:600;font-size:14px;}
  .title a{color:var(--text);text-decoration:none;font-weight:500;font-size:14px;line-height:1.4;}
  .title a:hover{color:var(--cyan);}

  .likes{
    font-family:'Noto Sans Lisu',sans-serif;
    font-weight:700;
    color:var(--cyan);
    font-size:16px;
    white-space:nowrap;
  }
  .views{color:var(--muted);font-size:13px;white-space:nowrap;}

  footer{margin-top:24px;color:var(--muted);font-size:12px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Leaderboard</div>
    <h1>재생목록 좋아요 순위</h1>
    <p class="sub">유튜브 재생목록의 영상들을 좋아요 수 기준으로 정렬해서 보여줍니다.</p>
  </header>

  <div class="panel">
    <div class="row">
      <div class="field">
        <label for="apiKey">YouTube Data API 키</label>
        <input id="apiKey" type="password" placeholder="AIza..." autocomplete="off">
      </div>
    </div>
    <div class="keyhint">
      API 키는 브라우저에만 남고 저장되지 않습니다 (새로고침하면 다시 입력해야 해요).
    </div>
    <div class="btn-row">
      <button id="loadBtn">순위 불러오기</button>
      <button id="refreshBtn" class="secondary-btn" type="button">새로고침</button>
    </div>
    <div id="status"></div>
  </div>

  <div class="panel" id="resultsPanel" style="display:none;">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>ID</th>
            <th>제목</th>
            <th>아티스트</th>
            <th>좋아요</th>
            <th>조회수</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <footer>YouTube Data API v3 사용 · 비공개 영상이거나 좋아요 수가 공개되지 않은 영상은 목록에서 제외될 수 있어요.</footer>
</div>

<script>
const PLAYLIST_ID = 'PLK95yj62t_z0';
const loadBtn = document.getElementById('loadBtn');
const refreshBtn = document.getElementById('refreshBtn');
const apiKeyInput = document.getElementById('apiKey');
const statusEl = document.getElementById('status');
const resultsPanel = document.getElementById('resultsPanel');
const tbody = document.getElementById('tbody');

function setStatus(msg, isErr){
  statusEl.textContent = msg || '';
  statusEl.className = isErr ? 'err' : '';
}

function fmt(n){
  if(n === undefined || n === null) return '—';
  return Number(n).toLocaleString('ko-KR');
}

async function fetchAllPlaylistVideoIds(playlistId, apiKey){
  let ids = [];
  let pageToken = '';
  while(true){
    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=contentDetails&maxResults=50&playlistId=${encodeURIComponent(playlistId)}&key=${encodeURIComponent(apiKey)}${pageToken ? '&pageToken=' + pageToken : ''}`;
    const res = await fetch(url);
    const data = await res.json();
    if(!res.ok){
      throw new Error(data.error && data.error.message ? data.error.message : '재생목록을 불러오지 못했습니다.');
    }
    (data.items || []).forEach(it => {
      if(it.contentDetails && it.contentDetails.videoId) ids.push(it.contentDetails.videoId);
    });
    if(data.nextPageToken){ pageToken = data.nextPageToken; } else { break; }
  }
  return ids;
}

async function fetchVideoDetails(ids, apiKey){
  let out = [];
  for(let i=0; i<ids.length; i+=50){
    const chunk = ids.slice(i, i+50);
    const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${chunk.join(',')}&key=${encodeURIComponent(apiKey)}`;
    const res = await fetch(url);
    const data = await res.json();
    if(!res.ok){
      throw new Error(data.error && data.error.message ? data.error.message : '영상 정보를 불러오지 못했습니다.');
    }
    (data.items || []).forEach(v => out.push(v));
  }
  return out;
}

function parseTitle(raw){
  let t = (raw || '').trim();
  // 맨 앞의 [...] 문구 제거 (예: [The 5th AM Music Contest])
  t = t.replace(/^\[[^\]]*\]\s*/, '').trim();
  // 맨 앞 두 자리 숫자를 ID로 추출
  let id = '';
  const idMatch = t.match(/^(\d{2})\s*(.*)$/);
  if(idMatch){
    id = idMatch[1];
    t = idMatch[2].trim();
  }
  // 첫 하이픈 기준 아티스트 / 제목 분리
  let artist = t, title = '';
  const dashIdx = t.search(/[-–—]/);
  if(dashIdx !== -1){
    artist = t.slice(0, dashIdx).trim();
    title = t.slice(dashIdx + 1).trim();
  }
  // 아티스트명 앞의 ". " 제거
  artist = artist.replace(/^\.\s*/, '').trim();
  return { id, artist, title };
}

function esc(str){
  return (str || '').replace(/</g,'&lt;');
}

function render(videos){
  tbody.innerHTML = '';
  videos.forEach((v, idx) => {
    const s = v.snippet || {};
    const stats = v.statistics || {};
    const { id, artist, title } = parseTitle(s.title);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="rank">${idx+1}</td>
      <td class="vid-id">${esc(id) || '—'}</td>
      <td class="title"><a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener">${esc(title) || esc(s.title)}</a></td>
      <td class="artist">${esc(artist) || '—'}</td>
      <td class="likes">${stats.likeCount !== undefined ? fmt(stats.likeCount) : '비공개'}</td>
      <td class="views">${fmt(stats.viewCount)}</td>
    `;
    tbody.appendChild(tr);
  });
  if(videos.length) resultsPanel.style.display = 'block';
}

async function loadData(){
  const apiKey = apiKeyInput.value.trim();
  if(!apiKey){ setStatus('API 키를 입력해주세요.', true); return; }

  loadBtn.disabled = true;
  refreshBtn.disabled = true;
  setStatus('재생목록 불러오는 중...');

  try{
    const ids = await fetchAllPlaylistVideoIds(PLAYLIST_ID, apiKey);
    if(ids.length === 0){
      setStatus('재생목록에서 영상을 찾을 수 없습니다.', true);
      return;
    }
    setStatus(`영상 ${ids.length}개 정보 가져오는 중...`);
    const videos = await fetchVideoDetails(ids, apiKey);
    videos.sort((a,b) => {
      const la = a.statistics && a.statistics.likeCount !== undefined ? Number(a.statistics.likeCount) : -1;
      const lb = b.statistics && b.statistics.likeCount !== undefined ? Number(b.statistics.likeCount) : -1;
      return lb - la;
    });
    render(videos);
    setStatus(`완료 — 영상 ${videos.length}개, 좋아요 순 정렬됨.`);
  }catch(err){
    setStatus(err.message || '오류가 발생했습니다.', true);
  }finally{
    loadBtn.disabled = false;
    refreshBtn.disabled = false;
  }
}

loadBtn.addEventListener('click', loadData);
refreshBtn.addEventListener('click', loadData);
apiKeyInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    e.preventDefault();
    loadData();
  }
});
</script>
</body>
</html>
